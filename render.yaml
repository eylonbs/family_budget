databases:
  - name: family-budget-db
    plan: free
    databaseName: family_budget
    user: budget_user

services:
  - type: web
    name: family-budget-tracker
    runtime: python
    buildCommand: pip install -r backend/requirements.txt
    startCommand: uvicorn backend.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: APP_PIN
        sync: false
      - key: SESSION_SECRET
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: family-budget-db
          property: connectionString
